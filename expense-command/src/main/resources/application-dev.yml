spring:
  #  profiles:
  #    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/pgsvc
    username: pgsvc
    password: pgsvc@123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 3
    consumer:
      auto-offset-reset: earliest

server:
  port: 8082
  servlet:
    context-path: /

# Enable swagger UI in dev
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Logging properties for dev
# These are read by log4j2.xml via system properties (-D)
logging:
  config: classpath:log4j2.xml
  level:
    org:
      springframework:
        web: DEBUG
        security: DEBUG

app:
  logging:
    format: text
    path: ./logs
    max-size: 50MB
    max-history: 30

# Expose actuator endpoints for local debugging
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,prometheus
  endpoint:
    health:
      show-details: always
    loggers:
      enabled: true

# Dev security - no JWT validation
jwt:
  validation:
    enabled: false
  secret: dev-secret-key-not-for-production
  issuer: http://localhost:8081/auth/realms/expense-management

