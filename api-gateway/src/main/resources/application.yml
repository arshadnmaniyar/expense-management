server:
  port: 8081

spring:
  cloud:
    gateway:
      routes:
        - id: expense-command
          uri: http://localhost:8082
          predicates:
            - Path=/expenses/**
        - id: insight-query
          uri: http://localhost:8083
          predicates:
            - Path=/insights/**

---
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      routes:
        - id: expense-command
          uri: http://expense-command:8082
          predicates:
            - Path=/expenses/**
        - id: insight-query
          uri: http://insight-query:8083
          predicates:
            - Path=/insights/**
